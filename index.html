<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Menu Site</title>
    <link rel="icon" href="cook.png">
    <style>
        h4 {
            margin: 0;
            padding: 0;
            line-height: 1;
        }
        .song-title {
            font-weight: normal;
            font-size: large;
        }
    </style> 
</head>

<body>
<h1>Playlists</h1>
<input type="range" min="0" max="1" step="0.01" value="1"
    oninput="document.querySelector('audio').volume = this.value">
<br>
<button onclick="document.querySelector('audio').pause()">Stop all</button>
<button onclick="document.querySelector('audio').currentTime=0">Reset all</button>
<button onclick="document.querySelector('audio').loop=true">Loop on</button>
<button onclick="document.querySelector('audio').loop=false">Loop off</button>
<hr>

<h3>Choose musics you wanna listen to: </h3>

<pre>
    <span class="song-title"><a href="lavender-jvke.html">Lavender</a></span> song by JVKE - Pink Sweat 
    <audio controls src="Music/JVKE - Lavender (Lyrics) Feat. Pink Sweat$.mp3"></audio>
    
    
</pre>
</body>
</html>
